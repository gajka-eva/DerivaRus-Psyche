<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпус отадъективных дериватов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Корпус отадъективных дериватов</h1>
            <p>Производные существительные со значением 'носитель признака (лицо)'</p>
            <p class="subtitle">«агрессивист», «умник», «злюка» и другие</p>
            <div class="stats" id="stats">Загрузка...</div>
        </header>

        <div class="search-panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск деривата" autocomplete="off">
                <button onclick="search()">🔍 Найти</button>
                <button onclick="clearSearch()" class="clear-btn">✖ Очистить</button>
            </div>
            
            <div class="filters">
                <div class="filter-group">
                    <label>📅 Год:</label>
                    <select id="yearFilter">
                        <option value="">Все</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🎭 Стиль:</label>
                    <select id="styleFilter">
                        <option value="">Все</option>
                        <option value="разговорный">Разговорный</option>
                        <option value="публицистический">Публицистический</option>
                        <option value="художественный">Художественный</option>

                    </select>
                </div>
                <div class="filter-group">
                    <label>🔤 Суффикс:</label>
                    <select id="suffixFilter">
                        <option value="">Все</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="results-header" id="resultsHeader"></div>
        <div class="results" id="results">
            <div class="loading">Загрузка корпуса... (может занять несколько секунд)</div>
        </div>
        
        <footer>
            <p>📊 Всего контекстов: <span id="totalCount">0</span> | 
            🔗 <a href="https://github.com/ВАШ_АККАУНТ/adj-person-corpus" target="_blank">GitHub репозиторий</a> |
            📝 Данные под лицензией CC BY 4.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
